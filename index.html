<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Olive Admin - Tufting</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 1000px; margin: 30px auto; padding: 20px; background: #f9f9f9; line-height: 1.6; }
    h1 { text-align: center; color: #2e7d32; margin-bottom: 10px; font-size: 2.8em; }
    .logo { font-size: 1.8em; margin-right: 10px; }
    h2 { color: #388e3c; }
    .section { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 3px 12px rgba(0,0,0,0.12); margin-bottom: 35px; }
    table { width: 100%; border-collapse: collapse; margin: 20px 0; }
    th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
    th { background: #e8f5e9; }
    input, select, button { padding: 10px; margin: 6px 0; border-radius: 6px; border: 1px solid #ccc; font-size: 1em; }
    button { background: #4caf50; color: white; border: none; cursor: pointer; }
    button:hover { background: #43a047; }
    .delete-btn { background: #f44336; }
    .delete-btn:hover { background: #d32f2f; }
    .total-box { font-size: 1.8em; font-weight: bold; margin: 30px 0; padding: 25px; background: #e8f5e9; border-radius: 12px; text-align: center; border: 2px solid #81c784; }
    .project-item { padding: 14px; background: #f1f8e9; margin: 10px 0; border-radius: 8px; display: flex; justify-content: space-between; cursor: pointer; }
    .project-item:hover { background: #dcedc8; }
    .number { font-variant-numeric: tabular-nums; }
  </style>
</head>
<body>

<h1><span class="logo">🫒</span> Olive Admin</h1>

<div class="section">
  <h2>1. Administrar Lanas</h2>
  <input type="text" id="nuevaLana" placeholder="Nombre lana">
  <input type="number" id="precioGramo" placeholder="Precio por gramo (ARS)" step="1" min="0">
  <button onclick="agregarLana()">+ Agregar</button>
  <button onclick="resetearCatalogo()" class="delete-btn" style="margin-left:10px;">Limpiar Catálogo</button>

  <table id="tablaCatalogo" style="margin-top:20px;">
    <thead><tr><th>Lana</th><th>Precio</th><th></th></tr></thead>
    <tbody id="cuerpoCatalogo"></tbody>
  </table>
</div>

<div class="section">
  <h2>2. Proyecto Actual</h2>
  <button onclick="nuevoProyecto()">Nuevo Proyecto</button>
  <button onclick="guardarProyectoActual()" style="margin-left:15px;">Guardar</button><br><br>

  <input type="text" id="nombreProyecto" placeholder="Nombre del proyecto" style="width:100%; max-width:400px;"><br><br>

  <table id="tablaProyecto">
    <thead><tr><th>Lana</th><th>Gramos</th><th>Costo</th><th></th></tr></thead>
    <tbody id="cuerpoProyecto"></tbody>
  </table>

  <button onclick="agregarFilaProyecto()" style="margin:15px 0;">+ Agregar Lana</button><br>

  Ganancia %: <input type="number" id="porcGanancia" value="60" min="0" step="5" style="width:80px;"> %<br><br>

  <div class="total-box">
    Total lanas: <span id="totalGasto" class="number">0</span> ARS<br>
    Precio cliente: <span id="precioFinal" class="number">0</span> ARS<br>
    Ganancia: <span id="gananciaPura" class="number">0</span> ARS
  </div>
</div>

<div class="section">
  <h2>Proyectos Guardados</h2>
  <div id="listaProyectos"></div>
</div>

<script>
// Todas las funciones se definen ANTES de usarlas
function formatARS(n) {
  return Math.round(n).toString().replace(/\B(?=(\d{3})+(?!\d))/g, ".");
}

let catalogo = {};
let proyectos = [];
let filaId = 0;

try {
  catalogo = JSON.parse(localStorage.getItem('tuftingCatalogo') || '{}');
  proyectos = JSON.parse(localStorage.getItem('tuftingProyectos') || '[]');
} catch (e) {
  console.error("Error al cargar storage", e);
}

function guardarCatalogo() {
  localStorage.setItem('tuftingCatalogo', JSON.stringify(catalogo));
  renderCatalogo();
  actualizarSelects();
}

function agregarLana() {
  const nombre = document.getElementById('nuevaLana').value.trim();
  const precio = Math.round(parseFloat(document.getElementById('precioGramo').value) || 0);
  if (!nombre || precio <= 0) return alert('Datos inválidos');
  catalogo[nombre] = precio;
  guardarCatalogo();
  document.getElementById('nuevaLana').value = '';
  document.getElementById('precioGramo').value = '';
}

function borrarLana(nombre) {
  if (!confirm(`Borrar ${nombre}?`)) return;
  delete catalogo[nombre];
  guardarCatalogo();
}

function renderCatalogo() {
  const tbody = document.getElementById('cuerpoCatalogo');
  tbody.innerHTML = '';
  Object.entries(catalogo).forEach(([n, p]) => {
    const tr = document.createElement('tr');
    tr.innerHTML = `<td>${n}</td><td class="number">$${formatARS(p)}</td><td><button class="delete-btn" onclick="borrarLana('${n.replace(/'/g,"\\'")}')">×</button></td>`;
    tbody.appendChild(tr);
  });
}

function resetearCatalogo() {
  if (!confirm('Borrar todo el catálogo?')) return;
  catalogo = {};
  localStorage.removeItem('tuftingCatalogo');
  renderCatalogo();
  actualizarSelects();
}

// Proyecto
function nuevoProyecto() {
  if (!confirm('¿Nuevo? Pierde cambios no guardados')) return;
  document.getElementById('nombreProyecto').value = '';
  document.getElementById('porcGanancia').value = 60;
  document.getElementById('cuerpoProyecto').innerHTML = '';
  filaId = 0;
  agregarFilaProyecto();
  calcularTodo();
}

function guardarProyectoActual() {
  const nombre = document.getElementById('nombreProyecto').value.trim();
  if (!nombre) return alert('Falta nombre');

  const lineas = [];
  document.querySelectorAll('#cuerpoProyecto tr').forEach(tr => {
    const s = tr.querySelector('select');
    const i = tr.querySelector('input');
    if (s.value) lineas.push({lana: s.value, gramos: parseFloat(i.value || 0)});
  });

  const porc = parseInt(document.getElementById('porcGanancia').value) || 0;

  const idx = proyectos.findIndex(p => p.nombre === nombre);
  if (idx >= 0 && !confirm('Sobrescribir?')) return;
  if (idx >= 0) proyectos[idx] = {nombre, lineas, porcGanancia: porc};
  else proyectos.push({nombre, lineas, porcGanancia: porc});

  localStorage.setItem('tuftingProyectos', JSON.stringify(proyectos));
  renderListaProyectos();
}

function cargarProyecto(nombre) {
  const p = proyectos.find(pr => pr.nombre === nombre);
  if (!p) return alert('No encontrado');

  document.getElementById('nombreProyecto').value = p.nombre;
  document.getElementById('porcGanancia').value = p.porcGanancia || 60;

  const tbody = document.getElementById('cuerpoProyecto');
  tbody.innerHTML = '';
  filaId = 0;

  actualizarSelects(); // actualiza opciones primero

  p.lineas.forEach(l => {
    agregarFilaProyecto();
    const fila = tbody.lastChild;
    const sel = fila.querySelector('select');
    const inp = fila.querySelector('input');
    sel.value = l.lana;
    inp.value = l.gramos;
  });

  calcularTodo();
}

function renderListaProyectos() {
  const div = document.getElementById('listaProyectos');
  div.innerHTML = '';
  proyectos.forEach(p => {
    const item = document.createElement('div');
    item.className = 'project-item';
    item.innerHTML = `<span onclick="cargarProyecto('${p.nombre.replace(/'/g,"\\'")}')">${p.nombre}</span>
                      <button class="delete-btn" onclick="borrarProyecto('${p.nombre.replace(/'/g,"\\'")}')">Borrar</button>`;
    div.appendChild(item);
  });
}

function borrarProyecto(nombre) {
  if (!confirm(`Borrar ${nombre}?`)) return;
  proyectos = proyectos.filter(p => p.nombre !== nombre);
  localStorage.setItem('tuftingProyectos', JSON.stringify(proyectos));
  renderListaProyectos();
}

// Tabla filas
function actualizarSelects() {
  const html = Object.entries(catalogo).map(([n,p]) => `<option value="${n}">${n} ($${formatARS(p)})</option>`).join('');
  document.querySelectorAll('.lana-select').forEach(s => {
    const v = s.value;
    s.innerHTML = '<option value="">--</option>' + html;
    if (v) s.value = v;
  });
}

function agregarFilaProyecto() {
  filaId++;
  const tr = document.createElement('tr');
  tr.innerHTML = `
    <td><select class="lana-select" onchange="calcularTodo()"></select></td>
    <td><input type="number" min="0" value="0" onchange="calcularTodo()" style="width:100px;"></td>
    <td class="number">0</td>
    <td><button class="delete-btn" onclick="this.closest('tr').remove(); calcularTodo();">×</button></td>
  `;
  document.getElementById('cuerpoProyecto').appendChild(tr);
  actualizarSelects();
  calcularTodo();
}

function calcularTodo() {
  let tot = 0;
  document.querySelectorAll('#cuerpoProyecto tr').forEach(tr => {
    const s = tr.querySelector('select');
    const i = tr.querySelector('input');
    const c = tr.cells[2];
    const g = parseFloat(i.value) || 0;
    const precio = catalogo[s.value] || 0;
    const costo = Math.round(g * precio);
    c.textContent = formatARS(costo);
    tot += costo;
  });
  const porc = parseInt(document.getElementById('porcGanancia').value) || 0;
  const final = Math.round(tot * (1 + porc / 100));
  document.getElementById('totalGasto').textContent = formatARS(tot);
  document.getElementById('precioFinal').textContent = formatARS(final);
  document.getElementById('gananciaPura').textContent = formatARS(final - tot);
}

// Inicio
renderCatalogo();
renderListaProyectos();
agregarFilaProyecto();
calcularTodo();
</script>
</body>
</html>
