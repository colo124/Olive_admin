<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Olive Admin - Tufting</title>
  <!-- Favicon aceituna -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🫒</text></svg>">
  <!-- Supabase JS client CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    /* (mismo estilo que antes, lo copio corto para no alargar) */
    body { font-family: Arial, sans-serif; max-width: 1100px; margin: 30px auto; padding: 20px; background: #f9f9f9; }
    h1 { text-align: center; color: #2e7d32; }
    .section { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 3px 12px rgba(0,0,0,0.12); margin-bottom: 35px; }
    textarea { width: 100%; height: 120px; }
    .total-box { font-size: 1.8em; text-align: center; background: #e8f5e9; padding: 25px; border-radius: 12px; }
    .project-item { padding: 14px; background: #f1f8e9; margin: 10px 0; border-radius: 8px; display: flex; justify-content: space-between; cursor: pointer; }
    .project-item:hover { background: #dcedc8; }
    .delete-btn { background: #f44336; color: white; border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; }
  </style>
</head>
<body>

<h1><span class="logo">🫒</span> Olive Admin</h1>

<div class="section">
  <h2>1. Administrar Lanas (local por ahora)</h2>
  <!-- Catálogo queda en localStorage por simplicidad; si querés en DB, lo agregamos después -->
  <input type="text" id="nuevaLana" placeholder="Nombre lana">
  <input type="number" id="precioGramo" placeholder="Precio por gramo" step="1" min="0">
  <button onclick="agregarLana()">+ Agregar</button>

  <table style="margin-top:20px;">
    <thead><tr><th>Lana</th><th>Precio</th><th></th></tr></thead>
    <tbody id="cuerpoCatalogo"></tbody>
  </table>
</div>

<div class="section">
  <h2>2. Proyecto Actual</h2>
  <button onclick="nuevoProyecto()">Nuevo</button>
  <button onclick="guardarProyectoActual()">Guardar en DB</button><br><br>

  <input type="text" id="nombreProyecto" placeholder="Nombre del proyecto"><br><br>

  <label>Anotaciones:</label><br>
  <textarea id="descripcionProyecto" placeholder="Cliente, fecha, notas..."></textarea><br><br>

  <table id="tablaProyecto">
    <thead><tr><th>Lana</th><th>Gramos</th><th>Costo</th><th></th></tr></thead>
    <tbody id="cuerpoProyecto"></tbody>
  </table>

  <button onclick="agregarFilaProyecto()">+ Lana</button><br><br>

  Ganancia %: <input type="number" id="porcGanancia" value="60" min="0" step="5" style="width:80px;"> %<br><br>

  <div class="total-box">
    Total lanas: <span id="totalGasto">0</span> ARS<br>
    Precio cliente: <span id="precioFinal">0</span> ARS<br>
    Ganancia: <span id="gananciaPura">0</span> ARS
  </div>
</div>

<div class="section">
  <h2>Proyectos en la nube</h2>
  <div id="listaProyectos"></div>
</div>

<script>
const SUPABASE_URL = 'https://gfesndaxezuplugbgjrp.supabase.co'; // reemplazá con tu URL
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdmZXNuZGF4ZXp1cGx1Z2JnanJwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyNTY4NDMsImV4cCI6MjA4OTgzMjg0M30.yKz7WwnGK1NU54xFpqK282rbt5ejqTrDGLc8Yhe8LEw'; // reemplazá con tu anon key

const supabase = Supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// Formato ARS
function formatARS(n) {
  return Math.round(n).toString().replace(/\B(?=(\d{3})+(?!\d))/g, ".");
}

// Catálogo local (mantenemos por ahora)
let catalogo = JSON.parse(localStorage.getItem('tuftingCatalogo') || '{}');
let filaId = 0;

function guardarCatalogo() {
  localStorage.setItem('tuftingCatalogo', JSON.stringify(catalogo));
  renderCatalogo();
  actualizarSelects();
}

// ... (funciones agregarLana, borrarLana, renderCatalogo, resetearCatalogo iguales que antes) ...

// Proyectos en Supabase
async function guardarProyectoActual() {
  const nombre = document.getElementById('nombreProyecto').value.trim();
  if (!nombre) return alert('Falta nombre');

  const descripcion = document.getElementById('descripcionProyecto').value.trim();

  const lineas = [];
  document.querySelectorAll('#cuerpoProyecto tr').forEach(tr => {
    const s = tr.querySelector('select');
    const i = tr.querySelector('input');
    if (s.value) lineas.push({lana: s.value, gramos: parseFloat(i.value || 0)});
  });

  const porc = parseInt(document.getElementById('porcGanancia').value) || 0;

  const { error } = await supabase
    .from('proyectos')
    .upsert({ 
      nombre, 
      descripcion, 
      lineas: JSON.stringify(lineas), 
      porc_ganancia: porc 
    }, { onConflict: 'nombre' });

  if (error) {
    console.error(error);
    alert('Error al guardar: ' + error.message);
  } else {
    alert('Guardado en la nube!');
    cargarProyectos();
  }
}

async function cargarProyectos() {
  const { data, error } = await supabase.from('proyectos').select('*').order('nombre');
  if (error) return console.error(error);

  const cont = document.getElementById('listaProyectos');
  cont.innerHTML = '';
  data.forEach(p => {
    const item = document.createElement('div');
    item.className = 'project-item';
    item.innerHTML = `<span onclick="cargarProyecto('${p.nombre}')">${p.nombre}</span>
                      <button class="delete-btn" onclick="borrarProyecto('${p.nombre}')">Borrar</button>`;
    cont.appendChild(item);
  });
}

async function cargarProyecto(nombre) {
  const { data, error } = await supabase.from('proyectos').select('*').eq('nombre', nombre).single();
  if (error || !data) return alert('No encontrado');

  document.getElementById('nombreProyecto').value = data.nombre;
  document.getElementById('descripcionProyecto').value = data.descripcion || '';
  document.getElementById('porcGanancia').value = data.porc_ganancia || 60;

  const tbody = document.getElementById('cuerpoProyecto');
  tbody.innerHTML = '';
  filaId = 0;

  actualizarSelects();

  const lineas = JSON.parse(data.lineas || '[]');
  lineas.forEach(l => {
    agregarFilaProyecto();
    const fila = tbody.lastChild;
    const sel = fila.querySelector('select');
    const inp = fila.querySelector('input');
    sel.value = l.lana;
    inp.value = l.gramos;
  });

  calcularTodo();
}

async function borrarProyecto(nombre) {
  if (!confirm(`Borrar ${nombre}?`)) return;
  const { error } = await supabase.from('proyectos').delete().eq('nombre', nombre);
  if (error) alert('Error: ' + error.message);
  else cargarProyectos();
}

// ... (resto de funciones: nuevoProyecto, agregarFilaProyecto, calcularTodo, actualizarSelects iguales) ...

// Init
renderCatalogo();
cargarProyectos(); // carga desde Supabase
agregarFilaProyecto();
calcularTodo();
</script>
</body>
</html>
