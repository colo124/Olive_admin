<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Olive Admin PRO</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body { font-family: Arial; max-width: 1100px; margin: auto; padding: 20px; background:#f5f5f5; }

.section { background:white; padding:20px; border-radius:12px; margin-bottom:25px; }

button { padding:8px 12px; border:none; border-radius:6px; cursor:pointer; background:#4caf50; color:white; }
.delete-btn { background:#f44336; }

.project-card {
  background:white;
  border-radius:12px;
  padding:15px;
  margin:10px 0;
  display:flex;
  justify-content:space-between;
  align-items:center;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
  cursor:pointer;
  transition:0.2s;
}
.project-card:hover { transform:scale(1.02); background:#f1f8e9; }

.project-name { font-weight:bold; font-size:1.1em; }
.project-meta { font-size:0.9em; color:#666; }

input, select { padding:6px; margin:5px; }

.total-box {
  background:#e8f5e9;
  padding:15px;
  margin-top:15px;
  border-radius:10px;
  font-weight:bold;
}
</style>
</head>

<body>

<h1>🫒 Olive Admin PRO</h1>

<div class="section">
<h2>Lanas</h2>
<input id="nuevaLana" placeholder="Nombre">
<input id="precioGramo" type="number" placeholder="Precio">
<button onclick="agregarLana()">Agregar</button>
</div>

<div class="section">
<h2>Proyecto</h2>

<input id="nombreProyecto" placeholder="Nombre proyecto"><br>

<button onclick="agregarFilaProyecto()">+ Lana</button>
<button onclick="guardarProyectoActual()">💾 Guardar</button>

<table>
<thead><tr><th>Lana</th><th>Gramos</th><th>Costo</th><th></th></tr></thead>
<tbody id="cuerpoProyecto"></tbody>
</table>

Ganancia % <input id="porcGanancia" type="number" value="60">

<div class="total-box">
Total: <span id="totalGasto">0</span><br>
Final: <span id="precioFinal">0</span>
</div>
</div>

<div class="section">
<h2>Proyectos</h2>

<input id="buscador" placeholder="Buscar..." oninput="cargarProyectos()">

<div id="listaProyectos"></div>
</div>

<script>
const SUPABASE_URL = 'https://gfesndaxezuplugbgjrp.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdmZXNuZGF4ZXp1cGx1Z2JnanJwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyNTY4NDMsImV4cCI6MjA4OTgzMjg0M30.yKz7WwnGK1NU54xFpqK282rbt5ejqTrDGLc8Yhe8LEw';

const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let catalogo = JSON.parse(localStorage.getItem('tuftingCatalogo') || '{}');

function format(n){ return Math.round(n).toLocaleString('es-AR'); }

// ===== LANAS =====
function agregarLana(){
  const n = nuevaLana.value.trim();
  const p = parseFloat(precioGramo.value);
  if(!n||!p) return;
  catalogo[n]=p;
  localStorage.setItem('tuftingCatalogo', JSON.stringify(catalogo));
}

// ===== PROYECTO =====
function agregarFilaProyecto(){
  const tr=document.createElement('tr');
  tr.innerHTML=`
    <td><select></select></td>
    <td><input type="number" value="0"></td>
    <td class="costo">0</td>
    <td><button onclick="this.closest('tr').remove();calcular()">x</button></td>
  `;
  cuerpoProyecto.appendChild(tr);
  actualizarSelects();
}

function actualizarSelects(){
  document.querySelectorAll('select').forEach(s=>{
    s.innerHTML = Object.keys(catalogo).map(n=>`<option>${n}</option>`).join('');
  });
}

function calcular(){
  let total=0;
  document.querySelectorAll('#cuerpoProyecto tr').forEach(tr=>{
    const lana=tr.querySelector('select').value;
    const g=parseFloat(tr.querySelector('input').value)||0;
    const precio=catalogo[lana]||0;
    const c=g*precio;
    tr.querySelector('.costo').textContent=format(c);
    total+=c;
  });
  const porc=porcGanancia.value||0;
  const final=total*(1+porc/100);
  totalGasto.textContent=format(total);
  precioFinal.textContent=format(final);
}

// ===== SUPABASE =====
async function guardarProyectoActual(){
  const nombre=nombreProyecto.value;
  if(!nombre) return alert("Nombre!");

  const lineas=[];
  document.querySelectorAll('#cuerpoProyecto tr').forEach(tr=>{
    lineas.push({
      lana:tr.querySelector('select').value,
      gramos:tr.querySelector('input').value
    });
  });

  await db.from('proyectos').upsert({
    nombre,
    lineas:JSON.stringify(lineas)
  });

  cargarProyectos();
}

async function cargarProyectos(){
  const {data,error}=await db.from('proyectos').select('*');
  if(error){console.log(error);return;}

  const filtro = buscador.value.toLowerCase();
  listaProyectos.innerHTML='';

  data
  .filter(p=>p.nombre.toLowerCase().includes(filtro))
  .forEach(p=>{
    let lineas=JSON.parse(p.lineas||'[]');

    let total=0;
    lineas.forEach(l=>{
      total+= (catalogo[l.lana]||0) * (l.gramos||0);
    });

    const card=document.createElement('div');
    card.className='project-card';

    card.innerHTML=`
      <div>
        <div class="project-name">${p.nombre}</div>
        <div class="project-meta">${lineas.length} items</div>
        <div class="project-meta">$${format(total)}</div>
      </div>

      <div>
        <button onclick="event.stopPropagation();cargarProyecto('${p.nombre}')">Abrir</button>
        <button class="delete-btn" onclick="event.stopPropagation();borrarProyecto('${p.nombre}')">X</button>
      </div>
    `;

    card.onclick=()=>cargarProyecto(p.nombre);

    listaProyectos.appendChild(card);
  });
}

async function cargarProyecto(nombre){
  const {data}=await db.from('proyectos').select('*').eq('nombre',nombre).single();

  cuerpoProyecto.innerHTML='';

  JSON.parse(data.lineas).forEach(l=>{
    agregarFilaProyecto();
    const tr=document.querySelector('#cuerpoProyecto tr:last-child');
    tr.querySelector('select').value=l.lana;
    tr.querySelector('input').value=l.gramos;
  });

  calcular();
}

async function borrarProyecto(nombre){
  if(!confirm("Borrar?")) return;
  await db.from('proyectos').delete().eq('nombre',nombre);
  cargarProyectos();
}

// INIT
agregarFilaProyecto();
cargarProyectos();
</script>

</body>
</html>
