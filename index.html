  <div id="mensajeError" class="error"></div>

  <table id="tablaCatalogo">

      <tr>
        <th>Lana</th>

        <th>Acción</th>

</div>

<script>
// Variables globales
let catalogo = {};

// Cargar desde localStorage (con try-catch por si falla)
try {
  const guardado = localStorage.getItem('tuftingCatalogo');
  if (guardado) {
    catalogo = JSON.parse(guardado);
  }
} catch (e) {
  console.error("Error cargando localStorage:", e);
  alert("No se pudo cargar el catálogo guardado. Empezamos de cero.");
}

// Guardar
function guardarCatalogo() {
  try {
    localStorage.setItem('tuftingCatalogo', JSON.stringify(catalogo));
    document.getElementById('mensajeError').textContent = '';
  } catch (e) {
    console.error("Error guardando:", e);
    document.getElementById('mensajeError').textContent = 'No se pudo guardar (quizá navegador bloquea localStorage en archivos locales)';
  }
  renderCatalogo();
  renderSelectsProyecto();
}

// Agregar/actualizar lana
function agregarLana() {
  const nombreInput = document.getElementById('nuevaLana');
  const precioInput = document.getElementById('precioGramo');
  const nombre = nombreInput.value.trim();
  const precio = parseFloat(precioInput.value);

  if (!nombre) {
    alert('Poné un nombre para la lana');
    nombreInput.focus();
    return;
  }
  if (isNaN(precio) || precio <= 0) {
    alert('El precio por gramo debe ser un número mayor a 0');
    precioInput.focus();
    return;
  }

  catalogo[nombre] = precio;
  guardarCatalogo();

  nombreInput.value = '';
  precioInput.value = '';
  nombreInput.focus();
}
