<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Olive Admin - Tufting</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🫒</text></svg>">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body { font-family: Arial, sans-serif; max-width: 1100px; margin: 30px auto; padding: 20px; background: #f9f9f9; line-height: 1.6; }
    h1 { text-align: center; color: #2e7d32; margin-bottom: 10px; }
    .logo { font-size: 2em; margin-right: 10px; }a
    h2 { color: #388e3c; }
    .section { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 3px 12px rgba(0,0,0,0.12); margin-bottom: 35px; }
    table { width: 100%; border-collapse: collapse; margin: 20px 0; }
    th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
    th { background: #e8f5e9; }
    input, select, textarea, button { padding: 10px; margin: 6px 0; border-radius: 6px; border: 1px solid #ccc; font-size: 1em; }
    textarea { width: 100%; height: 130px; resize: vertical; }
    button { background: #4caf50; color: white; border: none; cursor: pointer; }
    button:hover { background: #43a047; }
    .delete-btn { background: #f44336; }
    .delete-btn:hover { background: #d32f2f; }
    .total-box { font-size: 1.8em; font-weight: bold; margin: 30px 0; padding: 25px; background: #e8f5e9; border-radius: 12px; text-align: center; border: 2px solid #81c784; }
    .project-item { padding: 14px; background: #f1f8e9; margin: 10px 0; border-radius: 8px; display: flex; justify-content: space-between; cursor: pointer; }
    .project-item:hover { background: #dcedc8; }
    .number { font-variant-numeric: tabular-nums; }
  </style>
</head>
<body>

<h1><span class="logo">🫒</span> Olive Admin</h1>

<div class="section">
  <h2>1. Administrar Lanas</h2>
  <input type="text" id="nuevaLana" placeholder="Nombre lana">
  <input type="number" id="precioGramo" placeholder="Precio por gramo (ARS)">
  <button onclick="agregarLana()">+ Agregar</button>
  <button onclick="resetearCatalogo()" class="delete-btn" style="margin-left:10px;">Limpiar Catálogo</button>

  <table>
    <thead><tr><th>Lana</th><th>Precio</th><th></th></tr></thead>
    <tbody id="cuerpoCatalogo"></tbody>
  </table>
</div>

<div class="section">
  <h2>2. Proyecto Actual</h2>
  <button onclick="nuevoProyecto()">Nuevo Proyecto</button>
  <button onclick="guardarProyectoActual()">💾 Guardar en Supabase</button><br><br>

  <input type="text" id="nombreProyecto" placeholder="Nombre del proyecto"><br><br>
  <textarea id="descripcionProyecto" placeholder="Cliente, fecha, observaciones..."></textarea>

  <table>
    <thead><tr><th>Lana</th><th>Gramos</th><th>Costo</th><th></th></tr></thead>
    <tbody id="cuerpoProyecto"></tbody>
  </table>

  <button onclick="agregarFilaProyecto()">+ Agregar Lana</button><br><br>

  Ganancia %: <input type="number" id="porcGanancia" value="60">

  <div class="total-box">
    Gasto total: <span id="totalGasto">0</span> ARS<br>
    Precio: <span id="precioFinal">0</span> ARS<br>
    Ganancia: <span id="gananciaPura">0</span> ARS
  </div>
</div>

<div class="section">
  <h2>Proyectos en la Nube</h2>
  <div id="listaProyectos"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
// ==================== SUPABASE ====================
const SUPABASE_URL = 'https://gfesndaxezuplugbgjrp.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdmZXNuZGF4ZXp1cGx1Z2JnanJwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyNTY4NDMsImV4cCI6MjA4OTgzMjg0M30.yKz7WwnGK1NU54xFpqK282rbt5ejqTrDGLc8Yhe8LEw';

// 🔥 FIX IMPORTANTE (minúscula)
const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ==================== DATA ====================
let catalogo = JSON.parse(localStorage.getItem('tuftingCatalogo') || '{}');

// ==================== UTILS ====================
function formatARS(n) {
  return Math.round(n).toLocaleString('es-AR');
}

// ==================== CATÁLOGO ====================
function guardarCatalogo() {
  localStorage.setItem('tuftingCatalogo', JSON.stringify(catalogo));
  renderCatalogo();
  actualizarSelectsProyecto();
}

function agregarLana() {
  const nombre = document.getElementById('nuevaLana').value.trim();
  const precio = parseFloat(document.getElementById('precioGramo').value);
  if (!nombre || !precio) return alert('Datos inválidos');

  catalogo[nombre] = precio;
  guardarCatalogo();
}

function borrarLana(n) {
  delete catalogo[n];
  guardarCatalogo();
}

function renderCatalogo() {
  const t = document.getElementById('cuerpoCatalogo');
  t.innerHTML = '';
  Object.entries(catalogo).forEach(([n,p])=>{
    t.innerHTML += `<tr><td>${n}</td><td>$${formatARS(p)}</td><td><button onclick="borrarLana('${n}')">x</button></td></tr>`;
  });
}

function resetearCatalogo() {
  catalogo = {};
  localStorage.removeItem('tuftingCatalogo');
  renderCatalogo();
}

// ==================== PROYECTO ====================
function agregarFilaProyecto() {
  const tr = document.createElement('tr');
  tr.innerHTML = `
    <td><select class="lana-select" onchange="calcularTodo()"></select></td>
    <td><input type="number" value="0" onchange="calcularTodo()"></td>
    <td class="costo">0</td>
    <td><button onclick="this.closest('tr').remove(); calcularTodo()">x</button></td>
  `;
  document.getElementById('cuerpoProyecto').appendChild(tr);
  actualizarSelectsProyecto();
}

function actualizarSelectsProyecto() {
  document.querySelectorAll('.lana-select').forEach(s=>{
    s.innerHTML = '<option></option>' + 
      Object.keys(catalogo).map(n=>`<option>${n}</option>`).join('');
  });
}

function calcularTodo() {
  let total = 0;

  document.querySelectorAll('#cuerpoProyecto tr').forEach(tr=>{
    const lana = tr.querySelector('select').value;
    const gramos = parseFloat(tr.querySelector('input').value)||0;
    const precio = catalogo[lana]||0;

    const costo = gramos * precio;
    tr.querySelector('.costo').textContent = formatARS(costo);

    total += costo;
  });

  const porc = parseFloat(document.getElementById('porcGanancia').value)||0;
  const final = total * (1+porc/100);

  document.getElementById('totalGasto').textContent = formatARS(total);
  document.getElementById('precioFinal').textContent = formatARS(final);
  document.getElementById('gananciaPura').textContent = formatARS(final-total);
}

// ==================== SUPABASE ====================
async function guardarProyectoActual() {
  const nombre = document.getElementById('nombreProyecto').value;
  if (!nombre) return alert('Poné nombre');

  const lineas = [];

  document.querySelectorAll('#cuerpoProyecto tr').forEach(tr=>{
    lineas.push({
      lana: tr.querySelector('select').value,
      gramos: tr.querySelector('input').value
    });
  });

  await db.from('proyectos').upsert({
    nombre,
    lineas: JSON.stringify(lineas)
  });

  alert('Guardado');
  cargarProyectos();
}

async function cargarProyectos() {
  const {data, error} = await db.from('proyectos').select('*');

  if (error) {
    console.error(error);
    return;
  }

  const cont = document.getElementById('listaProyectos');
  cont.innerHTML='';

  (data || []).forEach(p=>{
    cont.innerHTML += `<div onclick="cargarProyecto('${p.nombre}')">${p.nombre}</div>`;
  });
}

async function cargarProyecto(nombre) {
  const {data} = await db.from('proyectos')
    .select('*')
    .eq('nombre',nombre)
    .single();

  document.getElementById('cuerpoProyecto').innerHTML='';

  JSON.parse(data.lineas).forEach(l=>{
    agregarFilaProyecto();

    const tr = document.querySelector('#cuerpoProyecto tr:last-child');
    tr.querySelector('select').value=l.lana;
    tr.querySelector('input').value=l.gramos;
  });

  calcularTodo();
}

// ==================== INIT ====================
renderCatalogo();
agregarFilaProyecto();
cargarProyectos();
</script>

</body>
</html>
